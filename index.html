<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1e3a5f" id="meta-theme-color">
  <title>Toddler Games</title>
  <script>
    (function () {
      try {
        var k = 'toddler-games-theme';
        var legacy = 'puzzle-theme';
        var pref = localStorage.getItem(k) || localStorage.getItem(legacy);
        var effective;
        if (pref === 'light') effective = 'light';
        else if (pref === 'dark') effective = 'dark';
        else {
          effective = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.setAttribute('data-theme', effective);
        var meta = document.getElementById('meta-theme-color');
        if (meta) meta.setAttribute('content', effective === 'dark' ? '#0f172a' : '#1e3a5f');
      } catch (e) {}
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared/shared-design-tokens.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    html {
      min-height: 100%;
      min-height: 100dvh;
      font-family: var(--font-family);
      color: var(--text-primary);
    }
    html[data-theme="light"] {
      background: var(--bg-primary);
    }
    html[data-theme="dark"] {
      background: var(--bg-primary);
    }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      gap: 28px;
      background: transparent;
    }
    .hub-top {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      max-width: calc(100vw - 24px);
    }
    .hub-theme,
    .hub-lang {
      padding: var(--space-sm) 14px;
      padding-right: 40px; /* Extra space for dropdown arrow */
      font-size: 16px;
      font-weight: 700;
      font-family: var(--font-family);
      border-radius: var(--radius-md);
      border: 3px solid var(--border-medium);
      cursor: pointer;
      box-shadow: var(--shadow-toy), var(--shadow-inset);
      transition: all 0.2s ease;
      color: var(--text-inverse);
      text-shadow:
        2px 2px 0px #000000,
        -1px -1px 0px #000000,
        1px -1px 0px #000000,
        -1px 1px 0px #000000;
    }
    .hub-theme {
      background: var(--btn-secondary);
    }
    .hub-lang {
      background: var(--btn-accent);
    }
    .hub-theme:hover,
    .hub-lang:hover {
      transform: scale(1.05);
      box-shadow: var(--shadow-hover), var(--shadow-inset);
    }
    .hub-theme:active,
    .hub-lang:active {
      transform: scale(0.96);
      box-shadow: var(--shadow-toy-soft), var(--shadow-inset);
    }
    h1 {
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 800;
      text-align: center;
      color: var(--text-inverse);
      text-shadow:
        2px 2px 0px #000000,
        -1px -1px 0px #000000,
        1px -1px 0px #000000,
        -1px 1px 0px #000000;
      font-family: var(--font-family);
    }
    .grid {
      display: grid;
      gap: 20px;
      width: 100%;
      max-width: 420px;
    }
    a.card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      padding: 28px var(--space-lg);
      border: 4px solid var(--card-border);
      box-shadow: var(--card-shadow);
      transition: transform 0.1s ease, filter 0.15s ease;
      text-align: center;
    }
    a.card:active {
      transform: translateY(3px);
      box-shadow: var(--shadow-toy-soft);
    }
    a.card:hover {
      filter: brightness(1.03);
      transform: scale(1.02);
    }
    .card__icon { font-size: 3rem; line-height: 1; margin-bottom: var(--space-sm); }
    .card__title {
      font-size: 1.35rem;
      font-weight: 800;
      margin-bottom: var(--space-xs);
      color: var(--text-primary);
      font-family: var(--font-family);
    }
    .card__desc {
      font-size: 0.95rem;
      color: var(--text-secondary);
      line-height: 1.35;
      font-family: var(--font-family);
    }
    .card--truck .card__title { color: #c2410c; }
    html[data-theme="dark"] .card--truck .card__title { color: #fb923c; }
    .card--puzzle .card__title { color: #15803d; }
    html[data-theme="dark"] .card--puzzle .card__title { color: #4ade80; }

    /* Grid spacing */
    .grid {
      gap: var(--space-lg);
    }
  </style>
</head>
<body>
  <div class="hub-top">
    <label for="hub-theme" class="sr-only" id="hub-theme-label">Theme</label>
    <select id="hub-theme" class="hub-theme" aria-labelledby="hub-theme-label">
      <option value="system" data-opt="system">🖥️ System</option>
      <option value="light" data-opt="light">☀️ Light</option>
      <option value="dark" data-opt="dark">🌙 Dark</option>
    </select>
    <label for="hub-lang" class="sr-only" id="hub-lang-label">Language</label>
    <select id="hub-lang" class="hub-lang" aria-labelledby="hub-lang-label">
      <option value="en">🇬🇧 English</option>
      <option value="fr">🇧🇪 Français</option>
      <option value="es">🇪🇨 Español</option>
    </select>
  </div>

  <h1 id="hub-h1">Pick a game</h1>
  <nav class="grid" aria-label="Games">
    <a class="card card--truck" href="truck/">
      <div class="card__icon" aria-hidden="true">🚙</div>
      <div class="card__title" id="hub-card-truck-title">Monster Truck Match</div>
      <div class="card__desc" id="hub-card-truck-desc">Drag shapes and colors onto the truck. Made for tiny fingers.</div>
    </a>
    <a class="card card--puzzle" href="puzzle/">
      <div class="card__icon" aria-hidden="true">🧩</div>
      <div class="card__title" id="hub-card-puzzle-title">Photo puzzle</div>
      <div class="card__desc" id="hub-card-puzzle-desc">Jigsaw puzzle with your own photos. Voronoi pieces and gentle hints.</div>
    </a>
  </nav>

  <script>
    (function () {
      var LANG_KEY = 'toddler-games-language';
      var LEGACY = 'monster-truck-language';
      var THEME_KEY = 'toddler-games-theme';
      var LEGACY_THEME = 'puzzle-theme';
      var HUB = {
        en: {
          title: 'Toddler Games',
          h1: 'Pick a game',
          langLabel: 'Language',
          themeLabel: 'Theme',
          themeSystem: '🖥️ System',
          themeLight: '☀️ Light',
          themeDark: '🌙 Dark',
          truckTitle: 'Monster Truck Match',
          truckDesc: 'Drag shapes and colors onto the truck. Made for tiny fingers.',
          puzzleTitle: 'Photo puzzle',
          puzzleDesc: 'Jigsaw puzzle with your own photos. Voronoi pieces and gentle hints.'
        },
        fr: {
          title: 'Jeux pour tout-petits',
          h1: 'Choisis un jeu',
          langLabel: 'Langue',
          themeLabel: 'Thème',
          themeSystem: '🖥️ Système',
          themeLight: '☀️ Clair',
          themeDark: '🌙 Sombre',
          truckTitle: 'Match de Monster Truck',
          truckDesc: 'Glisse formes et couleurs sur le camion. Pensé pour les petits doigts.',
          puzzleTitle: 'Puzzle photo',
          puzzleDesc: 'Puzzle avec tes photos. Pièces Voronoi et indices doux.'
        },
        es: {
          title: 'Juegos para peques',
          h1: 'Elige un juego',
          langLabel: 'Idioma',
          themeLabel: 'Tema',
          themeSystem: '🖥️ Sistema',
          themeLight: '☀️ Claro',
          themeDark: '🌙 Oscuro',
          truckTitle: 'Monster Truck a emparejar',
          truckDesc: 'Arrastra formas y colores al camión. Hecho para deditos.',
          puzzleTitle: 'Puzzle de fotos',
          puzzleDesc: 'Puzzle con tus fotos. Piezas Voronoi y pistas suaves.'
        }
      };
      function resolveLang() {
        try {
          var c = localStorage.getItem(LANG_KEY);
          if (c === 'en' || c === 'fr' || c === 'es') return c;
          var l = localStorage.getItem(LEGACY);
          if (l === 'en' || l === 'fr' || l === 'es') return l;
        } catch (e) {}
        return 'en';
      }
      function resolveEffectiveTheme(pref) {
        if (pref === 'dark') return 'dark';
        if (pref === 'light') return 'light';
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      function getThemePreference() {
        try {
          var v = localStorage.getItem(THEME_KEY) || localStorage.getItem(LEGACY_THEME);
          if (v === 'light' || v === 'dark' || v === 'system') return v;
        } catch (e) {}
        return 'system';
      }
      function applyThemeToDocument() {
        var pref = getThemePreference();
        var effective = resolveEffectiveTheme(pref);
        document.documentElement.setAttribute('data-theme', effective);
        var meta = document.getElementById('meta-theme-color');
        if (meta) meta.setAttribute('content', effective === 'dark' ? '#0f172a' : '#1e3a5f');
      }
      function applyThemeSelectLabels(lang) {
        var t = HUB[lang] || HUB.en;
        document.getElementById('hub-theme-label').textContent = t.themeLabel;
        var themeSel = document.getElementById('hub-theme');
        themeSel.querySelector('[data-opt="system"]').textContent = t.themeSystem;
        themeSel.querySelector('[data-opt="light"]').textContent = t.themeLight;
        themeSel.querySelector('[data-opt="dark"]').textContent = t.themeDark;
      }
      function apply(lang) {
        var t = HUB[lang] || HUB.en;
        document.documentElement.lang = lang === 'en' ? 'en' : lang === 'es' ? 'es' : 'fr';
        document.title = t.title;
        document.getElementById('hub-h1').textContent = t.h1;
        document.getElementById('hub-lang-label').textContent = t.langLabel;
        document.getElementById('hub-card-truck-title').textContent = t.truckTitle;
        document.getElementById('hub-card-truck-desc').textContent = t.truckDesc;
        document.getElementById('hub-card-puzzle-title').textContent = t.puzzleTitle;
        document.getElementById('hub-card-puzzle-desc').textContent = t.puzzleDesc;
        applyThemeSelectLabels(lang);
      }
      var sel = document.getElementById('hub-lang');
      var themeSel = document.getElementById('hub-theme');
      var lang = resolveLang();
      sel.value = lang;
      themeSel.value = getThemePreference();
      apply(lang);
      applyThemeToDocument();
      themeSel.addEventListener('change', function () {
        var v = themeSel.value;
        if (v !== 'light' && v !== 'dark' && v !== 'system') return;
        try {
          localStorage.setItem(THEME_KEY, v);
        } catch (e) {}
        applyThemeToDocument();
      });
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function () {
        if (getThemePreference() === 'system') applyThemeToDocument();
      });
      sel.addEventListener('change', function () {
        var v = sel.value;
        if (v !== 'en' && v !== 'fr' && v !== 'es') return;
        try {
          localStorage.setItem(LANG_KEY, v);
          localStorage.setItem(LEGACY, v);
        } catch (e) {}
        apply(v);
      });
    })();
  </script>
</body>
</html>
