<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛞 Tire Wall - All Shapes & Colors</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Comic Sans MS', cursive, sans-serif;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 48px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .tire-wall {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .tire-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .tire-card:hover {
            transform: translateY(-10px);
        }

        .tire-display {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 150px;
            margin-bottom: 15px;
        }

        .tire-label {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .tire-color {
            font-size: 14px;
            color: #666;
            text-transform: capitalize;
        }

        .back-link {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            color: #667eea;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .back-link:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }

        /* Override shape positioning for display */
        .shape {
            position: relative !important;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-link">🎮 Back to Game</a>

    <h1>🛞 Tire Wall Showcase</h1>

    <div class="tire-wall">
        <!-- Circle - Red -->
        <div class="tire-card">
            <div class="tire-label">Circle</div>
            <div class="tire-color">Red</div>
            <div class="tire-display">
                <div class="shape circle color-red size-large"></div>
            </div>
        </div>

        <!-- Square - Blue -->
        <div class="tire-card">
            <div class="tire-label">Square</div>
            <div class="tire-color">Blue</div>
            <div class="tire-display">
                <div class="shape square color-blue size-large"></div>
            </div>
        </div>

        <!-- Triangle - Green -->
        <div class="tire-card">
            <div class="tire-label">Triangle</div>
            <div class="tire-color">Green</div>
            <div class="tire-display">
                <div class="shape triangle color-green size-large"></div>
            </div>
        </div>

        <!-- Star - Yellow -->
        <div class="tire-card">
            <div class="tire-label">Star</div>
            <div class="tire-color">Yellow</div>
            <div class="tire-display">
                <div class="shape star color-yellow size-large"></div>
            </div>
        </div>

        <!-- Heart - Purple -->
        <div class="tire-card">
            <div class="tire-label">Heart</div>
            <div class="tire-color">Purple</div>
            <div class="tire-display">
                <div class="shape heart color-purple size-large"></div>
            </div>
        </div>

        <!-- Pentagon - Orange -->
        <div class="tire-card">
            <div class="tire-label">Pentagon</div>
            <div class="tire-color">Orange</div>
            <div class="tire-display">
                <div class="shape pentagon color-orange size-large"></div>
            </div>
        </div>

        <!-- Hexagon - Pink -->
        <div class="tire-card">
            <div class="tire-label">Hexagon</div>
            <div class="tire-color">Pink</div>
            <div class="tire-display">
                <div class="shape hexagon color-pink size-large"></div>
            </div>
        </div>

        <!-- Diamond - Cyan -->
        <div class="tire-card">
            <div class="tire-label">Diamond</div>
            <div class="tire-color">Cyan</div>
            <div class="tire-display">
                <div class="shape diamond color-cyan size-large"></div>
            </div>
        </div>

        <!-- Circle - Brown (new color) -->
        <div class="tire-card">
            <div class="tire-label">Circle</div>
            <div class="tire-color">Brown</div>
            <div class="tire-display">
                <div class="shape circle color-brown size-large"></div>
            </div>
        </div>

        <!-- Square - Lime (new color) -->
        <div class="tire-card">
            <div class="tire-label">Square</div>
            <div class="tire-color">Lime</div>
            <div class="tire-display">
                <div class="shape square color-lime size-large"></div>
            </div>
        </div>

        <!-- Star - Red (variety) -->
        <div class="tire-card">
            <div class="tire-label">Star</div>
            <div class="tire-color">Red</div>
            <div class="tire-display">
                <div class="shape star color-red size-large"></div>
            </div>
        </div>

        <!-- Heart - Blue (variety) -->
        <div class="tire-card">
            <div class="tire-label">Heart</div>
            <div class="tire-color">Blue</div>
            <div class="tire-display">
                <div class="shape heart color-blue size-large"></div>
            </div>
        </div>
    </div>

    <!-- SVG Masks for tire rim colorization -->
    <svg width="0" height="0" style="position: absolute;">
        <defs>
            <mask id="tire-mask-circle" maskContentUnits="objectBoundingBox">
                <image href="assets/images/tires/tire_circle.png" width="1" height="1" preserveAspectRatio="xMidYMid slice"/>
            </mask>
            <mask id="tire-mask-square" maskContentUnits="objectBoundingBox">
                <image href="assets/images/tires/tire_square.png" width="1" height="1" preserveAspectRatio="xMidYMid slice"/>
            </mask>
            <mask id="tire-mask-triangle" maskContentUnits="objectBoundingBox">
                <image href="assets/images/tires/tire_triangle.png" width="1" height="1" preserveAspectRatio="xMidYMid slice"/>
            </mask>
            <mask id="tire-mask-star" maskContentUnits="objectBoundingBox">
                <image href="assets/images/tires/tire_star.png" width="1" height="1" preserveAspectRatio="xMidYMid slice"/>
            </mask>
            <mask id="tire-mask-heart" maskContentUnits="objectBoundingBox">
                <image href="assets/images/tires/tire_heart.png" width="1" height="1" preserveAspectRatio="xMidYMid slice"/>
            </mask>
            <mask id="tire-mask-hexagon" maskContentUnits="objectBoundingBox">
                <image href="assets/images/tires/tire_hexagon.png" width="1" height="1" preserveAspectRatio="xMidYMid slice"/>
            </mask>
            <mask id="tire-mask-diamond" maskContentUnits="objectBoundingBox">
                <image href="assets/images/tires/tire_diamond.png" width="1" height="1" preserveAspectRatio="xMidYMid slice"/>
            </mask>
        </defs>
    </svg>
</body>
</html>
