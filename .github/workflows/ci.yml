name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Use Node.js 24-based action runtimes (see GitHub Actions Node 20 deprecation)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  puzzle:
    runs-on: ubuntu-latest
    env:
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
    defaults:
      run:
        working-directory: puzzle
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: puzzle/package-lock.json
      - run: npm ci
      - run: npm test
      - name: Production build (same base as Pages)
        env:
          VITE_BASE: /${{ github.event.repository.name }}/puzzle/
        run: npm run build

  truck:
    runs-on: ubuntu-latest
    env:
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
    defaults:
      run:
        working-directory: truck
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: truck/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm test
        env:
          CI: true
