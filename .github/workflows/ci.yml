name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Use Node.js 24-based action runtimes (see GitHub Actions Node 20 deprecation)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  puzzle:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: puzzle
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: puzzle/package-lock.json
      - name: Configure npm to use public registry
        run: |
          # Remove any .npmrc files
          rm -f ~/.npmrc
          rm -f .npmrc

          # Rewrite package-lock.json to use public npm registry instead of Artifactory
          if [ -f package-lock.json ]; then
            echo "Rewriting package-lock.json URLs from Artifactory to public registry..."
            sed -i 's|https://repox.jfrog.io/artifactory/api/npm/npm/|https://registry.npmjs.org/|g' package-lock.json
            echo "✅ Rewritten $(grep -c 'registry.npmjs.org' package-lock.json) URLs"
          fi

          echo "✅ npm configured to use public registry"
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm test
      - name: Production build (same base as Pages)
        env:
          VITE_BASE: /${{ github.event.repository.name }}/puzzle/
        run: npm run build

  truck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: truck
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: truck/package-lock.json
      - name: Configure npm to use public registry
        run: |
          # Remove any .npmrc files
          rm -f ~/.npmrc
          rm -f .npmrc

          # Rewrite package-lock.json to use public npm registry instead of Artifactory
          if [ -f package-lock.json ]; then
            echo "Rewriting package-lock.json URLs from Artifactory to public registry..."
            sed -i 's|https://repox.jfrog.io/artifactory/api/npm/npm/|https://registry.npmjs.org/|g' package-lock.json
            echo "✅ Rewritten $(grep -c 'registry.npmjs.org' package-lock.json) URLs"
          fi

          echo "✅ npm configured to use public registry"
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm test
        env:
          CI: true

  rhythm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rhythm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: rhythm/package-lock.json
      - name: Configure npm to use public registry
        run: |
          # Remove any .npmrc files
          rm -f ~/.npmrc
          rm -f .npmrc

          # Rewrite package-lock.json to use public npm registry instead of Artifactory
          if [ -f package-lock.json ]; then
            echo "Rewriting package-lock.json URLs from Artifactory to public registry..."
            sed -i 's|https://repox.jfrog.io/artifactory/api/npm/npm/|https://registry.npmjs.org/|g' package-lock.json
            echo "✅ Rewritten $(grep -c 'registry.npmjs.org' package-lock.json) URLs"
          fi

          echo "✅ npm configured to use public registry"
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm test
        env:
          CI: true
