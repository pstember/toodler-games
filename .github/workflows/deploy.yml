name: Deploy GitHub Pages

on:
  push:
    branches: [main]

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: puzzle/package-lock.json

      - name: Install and build puzzle
        working-directory: puzzle
        env:
          VITE_BASE: /${{ github.event.repository.name }}/puzzle/
        run: |
          npm ci
          npm run build

      - name: Verify puzzle dist (single-file build, no dev /src/main.js path)
        run: |
          test -s puzzle/dist/index.html
          if grep -q '/src/main.js' puzzle/dist/index.html; then
            echo "ERROR: puzzle/dist/index.html still references /src/main.js — dev HTML may have been copied by mistake."
            exit 1
          fi

      - name: Assemble site
        run: |
          mkdir -p _site/truck _site/puzzle
          cp index.html _site/
          rsync -a --exclude node_modules --exclude test-results --exclude playwright-report --exclude coverage --exclude .git truck/ _site/truck/
          cp -R puzzle/dist/. _site/puzzle/
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
